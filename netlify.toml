[build]
  command = "npm run version"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# API routes → serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
